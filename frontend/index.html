<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- SEO Meta Tags -->
    <title>Planner AI - Event Organization Marketplace in Uzbekistan</title>
    <meta name="title" content="Planner AI - Event Organization Marketplace in Uzbekistan" />
    <meta name="description" content="Discover and book venues, hire event services, purchase tickets, and manage events in Uzbekistan. Your all-in-one platform for event planning." />
    <meta name="keywords" content="events, venues, tickets, event planning, Uzbekistan, marketplace, booking, services, catering, photography, decoration" />
    <meta name="author" content="Planner AI" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://planner.ai" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://planner.ai/" />
    <meta property="og:title" content="Planner AI - Event Organization Marketplace" />
    <meta property="og:description" content="Discover and book venues, hire event services, purchase tickets, and manage events in Uzbekistan." />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:site_name" content="Planner AI" />
    <meta property="og:locale" content="en_US" />
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://planner.ai/" />
    <meta name="twitter:title" content="Planner AI - Event Organization Marketplace" />
    <meta name="twitter:description" content="Discover and book venues, hire event services, purchase tickets, and manage events in Uzbekistan." />
    <meta name="twitter:image" content="/og-image.png" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    
    <!-- Theme Color -->
    <meta name="theme-color" content="#3b82f6" />
    <meta name="color-scheme" content="light dark" />
    
    <!-- Theme Script -->
    <script>
      try {
        const s = JSON.parse(localStorage.getItem('planner-theme') || '{}')
        if (s.state?.theme === 'dark') document.documentElement.classList.add('dark')
      } catch {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
